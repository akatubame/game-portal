<svg width="1280" height="720" viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Solitaire screenshot</title>
  <desc id="desc">A green solitaire table with stock, waste, foundations, and seven tableau piles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b513e"/>
      <stop offset="0.55" stop-color="#062b25"/>
      <stop offset="1" stop-color="#050f13"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" x2="1" y1="0" y2="1">
