    </filter>
    <style>
      .label { fill: #d9a84e; font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; letter-spacing: 5px; }
      .small { fill: #f4f1e8; opacity: .72; font-family: Inter, Arial, sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; }
      .rank { font-family: Georgia, serif; font-size: 40px; font-weight: 800; }
      .suit { font-family: Georgia, serif; font-size: 58px; font-weight: 800; }
      .red { fill: #c9263a; }
      .black { fill: #161a1e; }
    </style>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>
  <circle cx="220" cy="88" r="210" fill="#51a98d" opacity=".16"/>
  <circle cx="1040" cy="660" r="310" fill="#d9a84e" opacity=".11"/>
  <rect x="70" y="54" width="1140" height="612" rx="42" fill="#0a3028" opacity=".72" stroke="#f4f1e8" stroke-opacity=".12"/>

  <text x="96" y="112" class="label">SOLITAIRE</text>
  <text x="96" y="148" class="small">KLONDIKE CARD GAME</text>

