    <g transform="translate(88 158)"><circle cx="18" cy="18" r="15" fill="#7fdfff"/><circle cx="18" cy="51" r="15" fill="#ffd45f"/></g>
    <g transform="translate(152 158)"><circle cx="18" cy="18" r="15" fill="#ba91ff"/><circle cx="18" cy="51" r="15" fill="#ff7b79"/></g>
