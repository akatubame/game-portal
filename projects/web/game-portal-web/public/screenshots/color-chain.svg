      <rect x="12" y="177" width="22" height="22" rx="7" fill="#ffd45f"/><rect x="44.5" y="177" width="22" height="22" rx="7" fill="#8ce59b"/>
      <rect x="77" y="177" width="22" height="22" rx="7" fill="#ba91ff"/><rect x="109.5" y="177" width="22" height="22" rx="7" fill="#ff7b79"/>
      <rect x="142" y="149.5" width="22" height="22" rx="7" fill="#ff7b79"/><rect x="174.5" y="122" width="22" height="22" rx="7" fill="#ff7b79"/>
      <rect x="207" y="94.5" width="22" height="22" rx="7" fill="#ff7b79"/><rect x="239.5" y="177" width="14" height="22" rx="6" fill="#7fdfff"/>
      <rect x="12" y="204.5" width="22" height="12" rx="5" fill="#7fdfff"/><rect x="44.5" y="204.5" width="22" height="12" rx="5" fill="#ff8bc8"/>
      <rect x="77" y="204.5" width="22" height="12" rx="5" fill="#ffd45f"/><rect x="109.5" y="204.5" width="22" height="12" rx="5" fill="#8ce59b"/>
      <rect x="142" y="204.5" width="22" height="12" rx="5" fill="#7fdfff"/><rect x="174.5" y="204.5" width="22" height="12" rx="5" fill="#ba91ff"/>
      <rect x="207" y="204.5" width="22" height="12" rx="5" fill="#ffd45f"/><rect x="239.5" y="204.5" width="14" height="12" rx="5" fill="#8ce59b"/>
    </g>
    <g filter="url(#glow)" fill="#fff4a0">
